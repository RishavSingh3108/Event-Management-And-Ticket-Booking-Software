<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details</title>
    <link rel="stylesheet" href="allBookings.css">
</head>
<body>
    <div class="admin-dashboard">
        <div class="dashboard-header">
            <h2><i class='bx bxs-receipt'></i> Booking & Payment Master List</h2>
            <div class="header-actions">
                <input type="text" id="adminSearch" placeholder="Search records..." onkeyup="filterTable()">
                <button class="refresh-btn" onclick="fetchAdminBookings()"><i class='bx bx-refresh'></i> Sync Data</button>
                <a href="../admin.html" class="back-btn">
                    <i class='bx bx-arrow-back'></i> Back to Dashboard
                </a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="admin-table" id="bookingTable">
                <thead>
                    <tr>
                        <th>Submitted</th>
                        <th>User Name</th>
                        <th>Email Address</th>
                        <th>Phone Number</th>
                        <th>Event Date</th>
                        <th>Guests</th>
                        <th>Purpose</th>
                        <th>Total Price</th>
                        <th>Amt Paid</th>
                        <th>Balance</th>
                        <th>Extra Needs</th>
                        <th>Proof</th> 
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <!-- Main Overlay -->
    <div id="proofModal" class="proof-modal" onclick="closeProof()">
        <div class="proof-content" onclick="event.stopPropagation()">
            <div class="proof-header">
                <h3 id="proofCaption">Payment Proof</h3>
                <span class="close-proof" onclick="closeProof()">&times;</span>
            </div>
            <div class="proof-image-container">
                <img id="proofImage" src="" alt="Payment Verification Screenshot">
            </div>
            <div class="proof-footer">
                <a id="downloadProof" href="" download="PaymentProof.png" class="download-btn">
                    <i class='bx bx-download'></i> Download Image
                </a>
            </div>
        </div>
    </div>
    <script src="allBookings.js"></script>
</body>
</html>
